<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.8; 
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            background-color: #f5f7fa;
        }
          h1 {
            font-size: 30px; 
            text-align: center; 
            color: #2196F3;
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 2px solid #2196F3;
            margin-bottom: 30px;
        }
        .subtitle {
            font-size: 22px;
            color: #333;
            font-weight: bold;
            margin: 25px 0 15px 0;
        }

        p {
            font-size: 16px; 
            color: #444;
            text-indent: 2em; 
            margin-bottom: 20px;
        }

        #advantage-list {
            font-size: 16px;
            color: #444;
            margin-left: 30px;
            margin-bottom: 20px;
            list-style-image: url('https://img.icons8.com/fluency/10/000000/code.png');
            list-style-position: inside;
        }

        #advantage-list li {
            margin: 8px 0;
            padding-left: 5px;
        }

        .highlight {
            background-color: #fff380;
            padding: 2px 4px;
            border-radius: 2px;
            font-weight: bold;
        }
        li{
            list-style-image: url(image/无标题.png);
        }
    </style>
</head>
<body>
    <h1>Claude Code —— 智能AI编程助手</h1>

    <h2 class="subtitle">什么是 Claude Code?</h2>

    <p>Claude Code 是由 Anthropic 公司推出的<span class="highlight">AI编程助手</span>，可以帮助初学者快速写代码、查错误、学逻辑，非常适合新手学习。</p >


    <h2 class="subtitle">Claude Code 核心优势</h2>

    <ul id="advantage-list">
        <li>支持HTML、CSS、JavaScript、Python等多种语言</li>
        <li>智能代码提示与自动修复</li>
        <li>代码逻辑详细讲解</li>
        <li>免费使用基础功能</li>
        <li>界面简洁、容易上手</li>
    </ul>


    <p>如果你正在学习编程，<span class="highlight">Claude Code</span> 会是你学习路上非常好的帮手，随时解答你的编程问题。</p >
</body>
</body>
</html>
